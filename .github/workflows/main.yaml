name: MLOps CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install apache-airflow==2.11.2 pytest

      - name: Lint (flake8)
        run: flake8 src/ tests/ dags/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Format check (black)
        run: black --check src/ tests/ dags/

      - name: Run DAG Integrity Test
        env:
          AIRFLOW_HOME: ${{ github.workspace }}/airflow
        run: pytest tests/test_dag.py -v

      - name: Test Docker Build
        run: docker build -t ml-project:test .

      - name: Run DVC pipeline (Prepare & Train)
        run: dvc repro

      - name: Run Quality Gate Tests
        env:
          RMSE_THRESHOLD: "16.5"
        run: pytest -v

      - name: Setup CML
        uses: iterative/setup-cml@v2

      - name: Create CML report
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## 📊 Model Metrics" > report.md
          cat metrics.json >> report.md
          echo "" >> report.md
          
          echo "## 📈 Feature Importance" >> report.md
          echo "![Feature Importance](./feature_importance.png)" >> report.md
          
          cml comment create report.md
