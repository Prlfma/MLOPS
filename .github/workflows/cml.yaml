name: Model CI (Train, Test, Report)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint (flake8)
        run: |
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Format check (black)
        run: |
          black --check src/ tests/
      - name: Run DVC pipeline (Prepare & Train)
        run: |
          dvc repro

      - name: Run Quality Gate Tests
        env:
          RMSE_THRESHOLD: "16.5"
        run: |
          pytest -v
      - name: Setup CML
        uses: iterative/setup-cml@v2
      - name: Create CML report
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## 📊 Model Metrics" > report.md
          cat metrics.json >> report.md
          echo "" >> report.md
          
          echo "## 📈 Feature Importance" >> report.md
          cml publish feature_importance.png --md >> report.md
          echo "" >> report.md
          
          echo "## 🛡️ Quality Gate" >> report.md
          echo "RMSE threshold: $RMSE_THRESHOLD" >> report.md
          
          cml comment create report.md